  /* 按钮几何位置固定，收起/展开时不再重新布局 */
  .sidebar-brand-toggle,
  body.sidebar-open .sidebar-brand-toggle{
    position:absolute!important;
    top:0!important;
    left:0!important;
    width:330px!important;
    height:60px!important;
    padding:0!important;
    margin:0!important;
    transform:none!important;
    transition:none!important;
    overflow:hidden!important;

  }

    top:50%!important;

    width:32px!important;
    height:auto!important;

    visibility:visible!important;
    transform:translateY(-50%) translateZ(0)!important;

  /* 展开Logo位置固定，不再横向跳动 */

    width:150px!important;
    height:auto!important;
    opacity:0!important;
    visibility:hidden!important;
    transform:translateY(-50%) translateZ(0)!important;

    transform:translateY(-50%) translateZ(0)!important;
    transition:opacity .16s ease .06s,visibility 0s linear!important;

    transition:opacity .10s ease,visibility 0s linear .10s!important;

    transform:none!important;
    pointer-events:auto!important;
    transition:opacity .16s ease .10s,visibility 0s linear .10s!important;
  }

  body.sidebar-transitioning .sidebar-brand-toggle{
    pointer-events:none!important;
  }

        const rowspan=Math.max(1,Number(cell.rowspan)||1),colspan=Math.max(1,Number(cell.colspan)||1);
        const attrs=`${rowspan>1?` rowspan="${rowspan}"`:''}${colspan>1?` colspan="${colspan}"`:''}`;
        return `<${tag}${attrs}>${markText(cell.text||'',q)}</${tag}>`;
      }).join('')}</tr>`;
    }
    return `<tr>${(allRows[rowIndex]||[]).map(value=>`<${tag}>${markText(value,q)}</${tag}>`).join('')}</tr>`;
  };
  const head=headerCount?`<thead>${headers.map((_,index)=>renderRow(index,true)).join('')}</thead>`:'';
  const body=`<tbody>${rows.map((_,index)=>renderRow(index+headerCount,false)).join('')}</tbody>`;
  const hint=Number(data.column_count||0)>6?'<div class="legal-table-hint">表格支持横向滚动</div>':'';
  return `<section class="legal-table-section" data-table-id="${esc(data.table_id||block.block_id||'')}"><div class="legal-table-caption">${markText(caption,q)}</div><div class="legal-table-wrap"><table class="legal-table">${head}${body}</table></div>${hint}${warningHtml}</section>`;
}
function renderStructuredFormula(block,d,q,index){
  const formula=block.formula_data||{};
  const expressions=Array.isArray(formula.expressions)?formula.expressions:[];
  let expressionIndex=0;
  return String(block.text||'').split(/\n/).map(line=>{
    const value=line.trim();
    if(!value)return '';
    const marker=value.match(/^【公式[^】]*】\s*(.*)$/);
    if(marker){
      const expression=expressions[expressionIndex++]||marker[1];
      return `<div class="legal-formula"><span class="legal-formula-label">${esc(formula.formula_label||'公式')}</span><span class="legal-formula-expression">${formatFormulaHTML(expression,q)}</span></div>`;
    }
    return renderOrdinaryLegalLine(value,index,d,q);
  }).join('');
}
function renderStructuredBlock(block,index,d,q){
  const type=block.block_type||'paragraph';
  const text=String(block.text||'').trim();
  if(!text||type==='document_title')return '';
  if(type==='table')return renderStructuredTable(block,q);
  if(block.formula_data||type==='formula')return `<section class="legal-formula-group">${renderStructuredFormula(block,d,q,index)}</section>`;
  if(type==='guide_heading')return `<h2 class="legal-guide-heading">${markText(text,q)}</h2>`;
  if(type==='guide_subheading')return `<h3 class="legal-guide-subheading">${markText(text,q)}</h3>`;
  if(type==='guide_minor_heading')return `<h4 class="legal-guide-minor-heading">${markText(text,q)}</h4>`;
  if(type==='part')return `<h3 class="legal-part">${markText(text,q)}</h3>`;
  if(type==='chapter')return `<h3 class="legal-chapter">${markText(text,q)}</h3>`;
  if(type==='section')return `<h4 class="legal-section">${markText(text,q)}</h4>`;
  if(type==='attachment')return `<h4 class="legal-attachment">${markText(text,q)}</h4>`;
  if(type==='note')return `<section class="legal-note-block"><div class="legal-note-title">注</div><div class="legal-note-item">${markText(text.replace(/^(?:注|说明|备注)\s*[:：]\s*/,''),q)}</div></section>`;
  if(type==='signoff')return `<div class="legal-signoff">${markText(text,q)}</div>`;
  return text.split(/\n/).map(line=>renderOrdinaryLegalLine(line.trim(),index,d,q)).join('');
}
function formatLegalDocument(d,q){
  const blocks=Array.isArray(d.structured_blocks)?d.structured_blocks:[];
  const output=blocks.length
    ?blocks.map((block,index)=>renderStructuredBlock(block,index,d,q))
    :cleanText(d).split(/\n+/).map((line,index)=>renderOrdinaryLegalLine(line.trim(),index,d,q));
  return `<div class="reader-document">${output.join('')}</div>`;
}
function openReader(docId=state.activeId){const d=docMap.get(docId);if(!d)return;state.activeId=docId;state.readerQuery='';state.readerIndex=0;document.getElementById('reader-title').textContent=d.document_title;document.getElementById('reader-query').value='';document.getElementById('reader-modal').classList.add('open');document.body.style.overflow='hidden';renderReader({resetScroll:true});setTimeout(()=>document.getElementById('reader-query').focus(),80)}
function closeReader(){document.getElementById('reader-modal').classList.remove('open');document.body.style.overflow='';}
function renderReader({resetScroll=false}={}){const d=docMap.get(state.activeId);if(!d)return;const body=document.getElementById('reader-body');const query=state.readerQuery.trim();body.innerHTML=formatLegalDocument(d,query);const matches=[...body.querySelectorAll('.reader-match')];if(!matches.length)state.readerIndex=0;else state.readerIndex=Math.max(0,Math.min(state.readerIndex,matches.length-1));matches.forEach((m,i)=>m.classList.toggle('current',i===state.readerIndex));const nav=document.getElementById('reader-nav');nav.hidden=!query;nav.setAttribute('aria-hidden',String(!query));document.getElementById('match-count').textContent=query?`${matches.length?state.readerIndex+1:0}/${matches.length}`:'';document.getElementById('prev-match').disabled=!matches.length;document.getElementById('next-match').disabled=!matches.length;requestAnimationFrame(()=>{if(resetScroll){body.scrollTop=0;}else if(query&&matches.length){matches[state.readerIndex].scrollIntoView({block:'center'});}});syncClearButtons()}
function moveMatch(delta){const matches=[...document.querySelectorAll('.reader-match')];if(!matches.length)return;state.readerIndex=(state.readerIndex+delta+matches.length)%matches.length;matches.forEach((m,i)=>m.classList.toggle('current',i===state.readerIndex));document.getElementById('match-count').textContent=`${state.readerIndex+1}/${matches.length}`;matches[state.readerIndex].scrollIntoView({behavior:'smooth',block:'center'})}
function clearFilters(){DIMENSIONS.forEach(d=>state.filters[d.key].clear());state.globalQuery='';state.currentPage=1;document.getElementById('global-query').value='';renderAll()}
function setSidebar(open){
  state.sidebarOpen=!!open;
  const body=document.body;
  const toggle=document.getElementById('sidebar-toggle');
  body.classList.add('sidebar-transitioning');
  body.classList.toggle('sidebar-open',state.sidebarOpen);
  if(toggle){
    toggle.setAttribute('aria-expanded',String(state.sidebarOpen));
    toggle.setAttribute('aria-label',state.sidebarOpen?'收起法规列表':'展开法规列表');
  }
  window.clearTimeout(state.sidebarTransitionTimer);
  state.sidebarTransitionTimer=window.setTimeout(()=>{
    body.classList.remove('sidebar-transitioning');
  },300);
}
function focusCard(docId){const card=document.getElementById(`card-${docId}`);if(card){card.scrollIntoView({behavior:'smooth',block:'center'});}}

document.getElementById('global-query').addEventListener('input',e=>{state.globalQuery=e.target.value;state.currentPage=1;renderAll()});
document.getElementById('filter-rows').addEventListener('click',e=>{const chip=e.target.closest('[data-dim]');if(!chip)return;const set=state.filters[chip.dataset.dim],v=chip.dataset.value;if(v==='__all__'){set.clear();}else{set.has(v)?set.delete(v):set.add(v);}state.currentPage=1;renderAll()});
document.getElementById('doc-list').addEventListener('click',e=>{const b=e.target.closest('[data-doc]');if(!b)return;const visible=visibleDocs();const index=visible.findIndex(d=>d.document_id===b.dataset.doc);state.activeId=b.dataset.doc;if(index>=0)state.currentPage=Math.floor(index/state.pageSize)+1;renderList();renderDetail(visible);renderPagination(visible);focusCard(state.activeId);});
document.getElementById('detail-area').addEventListener('click',e=>{const read=e.target.closest('[data-read]');if(read){e.preventDefault();openReader(read.dataset.read);return;}const card=e.target.closest('[data-card]');if(card){state.activeId=card.dataset.card;renderList();renderDetail(visibleDocs());renderPagination(visibleDocs());}});
document.getElementById('pagination').addEventListener('click',e=>{const btn=e.target.closest('[data-page]');if(!btn)return;state.currentPage=Number(btn.dataset.page)||1;renderDetail(visibleDocs());renderPagination(visibleDocs());const top=document.querySelector('.filter-panel')||document.querySelector('.top-search-row');if(top)top.scrollIntoView({behavior:'smooth',block:'start'});});
document.getElementById('clear-filters').addEventListener('click',clearFilters);

document.getElementById('global-clear').addEventListener('click',()=>{state.globalQuery='';state.currentPage=1;document.getElementById('global-query').value='';renderAll()});
document.getElementById('reader-clear').addEventListener('click',()=>{state.readerQuery='';state.readerIndex=0;document.getElementById('reader-query').value='';renderReader()});
document.getElementById('reader-query').addEventListener('input',e=>{state.readerQuery=e.target.value;state.readerIndex=0;renderReader()});
document.getElementById('reader-query').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();moveMatch(e.shiftKey?-1:1)}});
document.getElementById('prev-match').addEventListener('click',()=>moveMatch(-1));
document.getElementById('next-match').addEventListener('click',()=>moveMatch(1));
document.getElementById('close-reader').addEventListener('click',closeReader);
document.getElementById('reader-modal').addEventListener('click',e=>{if(e.target.id==='reader-modal')closeReader()});
document.getElementById('sidebar-toggle').addEventListener('click',()=>setSidebar(!state.sidebarOpen));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(document.getElementById('reader-modal').classList.contains('open'))closeReader();else if(state.sidebarOpen)setSidebar(false);}});
renderAll();
</script></body></html>
